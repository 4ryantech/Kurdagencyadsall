    function handleContactClick(e, url) {
        e.preventDefault(); // ڕێگری لە کلیکی خێرا

        // ناردنی داتا وەک لید
        ttq.track('Contact');
        ttq.track('SubmitForm');
        fbq('track', 'Lead');
        fbq('track', 'Contact');

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: white; overflow-x: hidden;
        }
        .glass-card { 
            width: 92%; max-width: 420px; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 35px 20px; border-radius: 40px; 
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { 
            font-size: 2.4rem; margin-bottom: 5px;
            background: linear-gradient(to right, #facc15, #f59e0b); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .agency-badge { color: #facc15; font-size: 1rem; margin-bottom: 20px; font-weight: bold; opacity: 0.9; }
        .btn { 
            display: flex; align-items: center; padding: 16px 20px; margin: 12px 0; 
            border-radius: 18px; text-decoration: none; color: white; 
            font-weight: 600; font-size: 1.1rem; transition: 0.2s; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            cursor: pointer;
        }
        .btn i { font-size: 1.6rem; margin-left: 15px; width: 30px; text-align: center; }
        .btn span { flex-grow: 1; text-align: right; }
        .btn:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.15); }
        .whatsapp { color: #25D366; } .viber { color: #7360f2; } 
        .snapchat { color: #FFFC00; } .instagram { color: #dc2743; } 
        .telegram { color: #0088cc; }
        .footer { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .footer b { color: #facc15; display: block; margin-bottom: 5px; font-size: 1rem; }
        .footer p { margin: 0; font-size: 0.85rem; opacity: 0.8; }
